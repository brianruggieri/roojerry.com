<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" role="img" aria-labelledby="pipeline-title pipeline-desc" style="font-family: system-ui, -apple-system, sans-serif;">
  <title id="pipeline-title">Claude Candidate Pipeline Architecture</title>
  <desc id="pipeline-desc">A horizontal flowchart showing: Session Logs and Job Posting feed into an Extractor stage, which produces a Candidate Profile, which flows into a Matcher stage, which produces a Fit Assessment, which is published as This Page.</desc>

  <!-- Background -->
  <rect width="900" height="240" fill="#F4F4F2" rx="12"/>

  <!-- ── Nodes ── -->

  <!-- Session Logs (input) -->
  <rect x="20" y="75" width="120" height="52" rx="8" fill="#EEF4F6" stroke="#23759E" stroke-width="1.5"/>
  <text x="80" y="97" text-anchor="middle" font-size="11" font-weight="700" fill="#2D4A52" letter-spacing="0.3">SESSION</text>
  <text x="80" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#2D4A52" letter-spacing="0.3">LOGS</text>

  <!-- Job Posting (input) -->
  <rect x="20" y="147" width="120" height="52" rx="8" fill="#EEF4F6" stroke="#23759E" stroke-width="1.5"/>
  <text x="80" y="169" text-anchor="middle" font-size="11" font-weight="700" fill="#2D4A52" letter-spacing="0.3">JOB</text>
  <text x="80" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="#2D4A52" letter-spacing="0.3">POSTING</text>

  <!-- Arrow: Session Logs → Extractor -->
  <line x1="140" y1="101" x2="192" y2="116" stroke="#23759E" stroke-width="1.5" stroke-dasharray="none"/>
  <polygon points="192,110 196,120 186,118" fill="#23759E"/>

  <!-- Arrow: Job Posting → Matcher -->
  <line x1="140" y1="173" x2="540" y2="130" stroke="#23759E" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="535,123 544,128 537,135" fill="#23759E"/>

  <!-- Extractor stage -->
  <rect x="196" y="86" width="120" height="52" rx="8" fill="#23759E"/>
  <text x="256" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="white" letter-spacing="0.3">EXTRACTOR</text>
  <text x="256" y="126" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.75)">+ Resume Parser</text>

  <!-- Arrow: Extractor → Candidate Profile -->
  <line x1="316" y1="112" x2="362" y2="112" stroke="#23759E" stroke-width="1.5"/>
  <polygon points="360,107 368,112 360,117" fill="#23759E"/>

  <!-- Candidate Profile -->
  <rect x="368" y="86" width="130" height="52" rx="8" fill="#EEF4F6" stroke="#23759E" stroke-width="1.5"/>
  <text x="433" y="106" text-anchor="middle" font-size="10" font-weight="700" fill="#2D4A52" letter-spacing="0.3">CANDIDATE</text>
  <text x="433" y="120" text-anchor="middle" font-size="10" font-weight="700" fill="#2D4A52" letter-spacing="0.3">PROFILE</text>
  <text x="433" y="132" text-anchor="middle" font-size="8.5" fill="#6E6C70">MergedEvidence</text>

  <!-- Arrow: Candidate Profile → Matcher -->
  <line x1="498" y1="112" x2="544" y2="112" stroke="#23759E" stroke-width="1.5"/>
  <polygon points="542,107 550,112 542,117" fill="#23759E"/>

  <!-- Matcher stage -->
  <rect x="550" y="86" width="120" height="52" rx="8" fill="#23759E"/>
  <text x="610" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="white" letter-spacing="0.3">MATCHER</text>
  <text x="610" y="126" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.75)">Taxonomy-driven</text>

  <!-- Arrow: Matcher → Fit Assessment -->
  <line x1="670" y1="112" x2="716" y2="112" stroke="#23759E" stroke-width="1.5"/>
  <polygon points="714,107 722,112 714,117" fill="#23759E"/>

  <!-- Fit Assessment -->
  <rect x="722" y="86" width="130" height="52" rx="8" fill="#EEF4F6" stroke="#23759E" stroke-width="1.5"/>
  <text x="787" y="106" text-anchor="middle" font-size="10" font-weight="700" fill="#2D4A52" letter-spacing="0.3">FIT</text>
  <text x="787" y="120" text-anchor="middle" font-size="10" font-weight="700" fill="#2D4A52" letter-spacing="0.3">ASSESSMENT</text>
  <text x="787" y="132" text-anchor="middle" font-size="8.5" fill="#6E6C70">Grade + Evidence</text>

  <!-- Arrow: Fit Assessment → This Page (curved down) -->
  <path d="M787 138 L787 175 L833 175" stroke="#89C45A" stroke-width="2" fill="none"/>
  <polygon points="831,170 839,175 831,180" fill="#89C45A"/>

  <!-- This Page (terminal node) -->
  <rect x="839" y="155" width="42" height="40" rx="6" fill="#89C45A"/>
  <text x="860" y="172" text-anchor="middle" font-size="8.5" font-weight="700" fill="white">THIS</text>
  <text x="860" y="184" text-anchor="middle" font-size="8.5" font-weight="700" fill="white">PAGE</text>

  <!-- Callibration note at bottom -->
  <text x="450" y="225" text-anchor="middle" font-size="9" fill="#6E6C70">Calibrated against real job postings · Three-tier evidence model (inspectable, deployed, claimed)</text>
</svg>
