<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="g" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#2D4A52"/>

  <!-- Ambient scatter nodes (suggest the star field) -->
  <circle cx="27" cy="3"  r="0.6" fill="#3085A4" opacity="0.4"/>
  <circle cx="3"  cy="29" r="0.5" fill="#8BBAC1" opacity="0.35"/>
  <circle cx="28" cy="22" r="0.5" fill="#3085A4" opacity="0.3"/>

  <!-- Constellation lines forming the letter R -->
  <g stroke="#8BBAC1" stroke-width="1.2" stroke-linecap="round" opacity="0.72">
    <!-- Top cap -->
    <line x1="6.5" y1="5"  x2="20"   y2="5"/>
    <!-- Bowl upper-right -->
    <line x1="20"  y1="5"  x2="22"   y2="12"/>
    <!-- Bowl base back to spine -->
    <line x1="22"  y1="12" x2="6.5"  y2="17"/>
    <!-- Spine (full height) -->
    <line x1="6.5" y1="5"  x2="6.5"  y2="27"/>
    <!-- Leg -->
    <line x1="22"  y1="12" x2="24.5" y2="27"/>
  </g>

  <!-- Nodes -->
  <!-- Spine top / cap-left -->
  <circle cx="6.5"  cy="5"  r="2.2" fill="#3085A4" filter="url(#g)"/>
  <!-- Cap-right / bowl top -->
  <circle cx="20"   cy="5"  r="1.6" fill="#3085A4" filter="url(#g)"/>
  <!-- Bowl-right / leg origin — accent highlight -->
  <circle cx="22"   cy="12" r="2.8" fill="#89C45A" filter="url(#g)"/>
  <!-- Mid-spine / bowl base -->
  <circle cx="6.5"  cy="17" r="1.6" fill="#3085A4" filter="url(#g)"/>
  <!-- Spine bottom -->
  <circle cx="6.5"  cy="27" r="2"   fill="#3085A4" filter="url(#g)"/>
  <!-- Leg foot -->
  <circle cx="24.5" cy="27" r="1.6" fill="#3085A4" filter="url(#g)"/>
</svg>
