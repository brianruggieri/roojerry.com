<dialog id="ie-overlay" class="ie-overlay" aria-label="Interactive experiment">
	<div class="ie-overlay__backdrop"></div>
	<iframe class="ie-overlay__frame" src="about:blank" title="Interactive experiment"
	        allow="accelerometer; gyroscope; fullscreen" sandbox="allow-scripts allow-same-origin"></iframe>
	{{/* autofocus: showModal() would otherwise focus the iframe, swallowing Escape */}}
	<button class="ie-overlay__close" type="button" aria-label="Close interactive" autofocus>
		{{ partial "icon.html" (dict "icon" "fas fa-times") }}
	</button>
</dialog>
