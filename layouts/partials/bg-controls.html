<div id="bg-controls" class="bg-controls" role="group" aria-label="Background animation controls">
  <!-- Source order = tab order = interaction priority.
       flex-direction: column-reverse in CSS renders these bottom-to-top,
       so play/pause lands at the bottom (primary, most reachable). -->

  <!-- 1. Play / Pause — primary action, bottom position -->
  <button id="bgc-play" class="bgc-btn" aria-label="Pause animation" data-tooltip="Pause"></button>

  <!-- 2. Visibility toggle — secondary, middle position -->
  <button id="bgc-visible" class="bgc-btn" aria-label="Hide background" data-tooltip="Hide"></button>

  <!-- 3. Randomize — tertiary, top position -->
  <button id="bgc-reset" class="bgc-btn" aria-label="Randomize particles" data-tooltip="Randomize">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
    </svg>
  </button>
</div>
